<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bosphorus Virtual Airlines</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    header{
      text-align:center;
      padding:100px 20px;
      background:#111827;
    }

    h1{
      font-size:60px;
      margin:0;
    }

    h1 span{
      color:#ef4444;
    }

    p{
      color:#cbd5e1;
      font-size:20px;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:15px 30px;
      background:#ef4444;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

    section{
      padding:60px 20px;
      max-width:1000px;
      margin:auto;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
    }

    footer{
      text-align:center;
      padding:30px;
      border-top:1px solid #334155;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>BOSPHORUS <span>VIRTUAL AIRLINES</span></h1>

  <p>
    Modern Turkish Virtual Airline operating on the VATSIM Network.
  </p>

  <a class="btn" href="https://discord.gg/PBkaSAfjeG">
    Join Discord
  </a>
</header>

<section>
  <h2>About Us</h2>

  <div class="cards">
    <div class="card">
      <h3>Hub</h3>
      <p>LTFM Istanbul Airport</p>
    </div>

    <div class="card">
      <h3>Network</h3>
      <p>VATSIM</p>
    </div>

    <div class="card">
      <h3>Fleet</h3>
      <p>A320 / B738</p>
    </div>

    <div class="card">
      <h3>Region</h3>
      <p>Europe</p>
    </div>
  </div>
</section>

<section>
  <h2>Popular Routes</h2>

  <div class="cards">
    <div class="card">LTFM → LTAC</div>
    <div class="card">LTFM → EGLL</div>
    <div class="card">LTFM → EHAM</div>
    <div class="card">LTFM → EDDF</div>
  </div>
</section>

<footer>
  © 2026 Bosphorus Virtual Airlines
</footer>

</body>
</html>
